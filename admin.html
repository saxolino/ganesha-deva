<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Ganesha Deva</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0eb; color: #1a1a1a; }
    .login, .admin { max-width: 900px; margin: 0 auto; padding: 40px 24px; }
    .login { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    .login h1 { font-size: 28px; color: #A90A7C; margin-bottom: 24px; }
    .login input { padding: 14px 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 300px; margin-bottom: 12px; }
    .login button { padding: 14px 32px; background: #A90A7C; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    .admin { display: none; }
    .admin.visible { display: block; }
    .admin h1 { font-size: 24px; color: #A90A7C; margin-bottom: 8px; }
    .admin p.subtitle { color: #888; margin-bottom: 32px; }
    .tabs { display: flex; gap: 0; border-bottom: 2px solid #e0d8d0; margin-bottom: 32px; }
    .tab { padding: 12px 24px; cursor: pointer; font-size: 14px; font-weight: 500; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .tab:hover { color: #A90A7C; }
    .tab.active { color: #A90A7C; border-bottom-color: #A90A7C; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .item-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .item-card { background: #fff; border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .item-card img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
    .item-card .info { flex: 1; }
    .item-card .info h4 { font-size: 15px; margin-bottom: 2px; }
    .item-card .info small { color: #888; font-size: 12px; }
    .item-card .actions { display: flex; gap: 8px; }
    .item-card .actions button { padding: 6px 14px; font-size: 12px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: #fff; }
    .item-card .actions .del { color: #e74c3c; border-color: #e74c3c; }
    .btn-add { padding: 12px 28px; background: #A90A7C; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .btn-add:hover { background: #8a0866; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; display: none; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; padding: 32px; width: 90%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 20px; color: #A90A7C; margin-bottom: 20px; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; }
    .field input, .field textarea, .field select { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; }
    .field textarea { resize: vertical; min-height: 80px; }
    .field input[type="file"] { padding: 8px; }
    .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
    .modal-actions button { padding: 12px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
    .modal-actions .save { background: #A90A7C; color: #fff; }
    .modal-actions .cancel { background: #eee; color: #555; }
    .status { padding: 12px 20px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none; }
    .status.success { display: block; background: #d4edda; color: #155724; }
    .status.error { display: block; background: #f8d7da; color: #721c24; }
    .status.loading { display: block; background: #fff3cd; color: #856404; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login" id="loginScreen">
    <h1>Ganesha Deva Admin</h1>
    <input type="password" id="tokenInput" placeholder="GitHub Token">
    <button onclick="doLogin()">Accedi</button>
  </div>

  <!-- ADMIN PANEL -->
  <div class="admin" id="adminPanel">
    <h1>Gestione Contenuti</h1>
    <p class="subtitle">Aggiungi, modifica o rimuovi contenuti. Le modifiche vanno live in circa 30 secondi.</p>

    <div id="statusMsg" class="status"></div>

    <div class="tabs">
      <div class="tab active" data-tab="eventi">Eventi</div>
      <div class="tab" data-tab="viaggi">Viaggi</div>
      <div class="tab" data-tab="percorsi">Percorsi</div>
      <div class="tab" data-tab="blog">Blog</div>
    </div>

    <div class="tab-content active" data-tab="eventi">
      <div class="item-list" id="list-eventi"></div>
      <button class="btn-add" onclick="openForm('eventi')">+ Nuovo Evento</button>
    </div>
    <div class="tab-content" data-tab="viaggi">
      <div class="item-list" id="list-viaggi"></div>
      <button class="btn-add" onclick="openForm('viaggi')">+ Nuovo Viaggio</button>
    </div>
    <div class="tab-content" data-tab="percorsi">
      <div class="item-list" id="list-percorsi"></div>
      <button class="btn-add" onclick="openForm('percorsi')">+ Nuovo Percorso</button>
    </div>
    <div class="tab-content" data-tab="blog">
      <div class="item-list" id="list-blog"></div>
      <button class="btn-add" onclick="openForm('blog')">+ Nuovo Articolo</button>
    </div>
  </div>

  <!-- MODAL FORM -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">Nuovo contenuto</h2>
      <form id="contentForm">
        <input type="hidden" id="f-type">
        <input type="hidden" id="f-index" value="-1">
        <div class="field"><label>Titolo</label><input type="text" id="f-titolo" required></div>
        <div class="field" id="field-data"><label>Data (YYYY-MM-DD)</label><input type="date" id="f-data"></div>
        <div class="field" id="field-periodo"><label>Periodo (es. "Giugno - Luglio")</label><input type="text" id="f-periodo"></div>
        <div class="field" id="field-luogo"><label>Luogo</label><input type="text" id="f-luogo"></div>
        <div class="field"><label>Descrizione</label><textarea id="f-descrizione"></textarea></div>
        <div class="field" id="field-estratto" style="display:none"><label>Estratto</label><textarea id="f-estratto"></textarea></div>
        <div class="field"><label>Immagine (percorso relativo, es. img/eventi/nome.jpg)</label><input type="text" id="f-immagine"></div>
        <div class="modal-actions">
          <button type="submit" class="save">Salva e Pubblica</button>
          <button type="button" class="cancel" onclick="closeForm()">Annulla</button>
        </div>
      </form>
    </div>
  </div>

<script>
  var REPO = 'saxolino/ganesha-deva';
  var BRANCH = 'main';
  var token = '';

  var FILES = {
    eventi: 'data/events.json',
    viaggi: 'data/viaggi.json',
    percorsi: 'data/percorsi.json',
    blog: 'data/blog.json'
  };

  var contentCache = {};

  // --- Login ---
  function doLogin() {
    token = document.getElementById('tokenInput').value.trim();
    if (!token) return;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').classList.add('visible');
    loadAll();
  }

  // --- Tabs ---
  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
      tab.classList.add('active');
      document.querySelector('.tab-content[data-tab="' + tab.dataset.tab + '"]').classList.add('active');
    });
  });

  // --- Load all content ---
  function loadAll() {
    Object.keys(FILES).forEach(function(type) { loadContent(type); });
  }

  function loadContent(type) {
    ghGet(FILES[type]).then(function(result) {
      contentCache[type] = { data: JSON.parse(atob(result.content)), sha: result.sha };
      renderList(type);
    });
  }

  function renderList(type) {
    var list = document.getElementById('list-' + type);
    var items = contentCache[type].data;
    list.textContent = '';

    items.forEach(function(item, i) {
      var card = document.createElement('div');
      card.className = 'item-card';

      if (item.immagine) {
        var img = document.createElement('img');
        img.src = item.immagine;
        img.alt = item.titolo;
        card.appendChild(img);
      }

      var info = document.createElement('div');
      info.className = 'info';
      var h4 = document.createElement('h4');
      h4.textContent = item.titolo;
      info.appendChild(h4);
      var small = document.createElement('small');
      small.textContent = (item.luogo || '') + (item.periodo ? ' - ' + item.periodo : '') + (item.data ? ' | ' + item.data : '');
      info.appendChild(small);
      card.appendChild(info);

      var actions = document.createElement('div');
      actions.className = 'actions';

      var editBtn = document.createElement('button');
      editBtn.textContent = 'Modifica';
      editBtn.addEventListener('click', function() { openForm(type, i); });
      actions.appendChild(editBtn);

      var delBtn = document.createElement('button');
      delBtn.className = 'del';
      delBtn.textContent = 'Elimina';
      delBtn.addEventListener('click', function() { deleteItem(type, i); });
      actions.appendChild(delBtn);

      var toggle = document.createElement('button');
      toggle.textContent = item.attivo ? 'Attivo' : 'Nascosto';
      toggle.style.color = item.attivo ? '#27ae60' : '#888';
      toggle.addEventListener('click', function() { toggleActive(type, i); });
      actions.appendChild(toggle);

      card.appendChild(actions);
      list.appendChild(card);
    });
  }

  // --- Form ---
  function openForm(type, index) {
    document.getElementById('f-type').value = type;
    document.getElementById('f-index').value = index !== undefined ? index : -1;
    document.getElementById('modalTitle').textContent = index !== undefined ? 'Modifica' : 'Nuovo ' + type.charAt(0).toUpperCase() + type.slice(1);

    // Show/hide fields based on type
    document.getElementById('field-data').style.display = (type === 'percorsi') ? 'none' : '';
    document.getElementById('field-periodo').style.display = (type === 'blog' || type === 'percorsi') ? 'none' : '';
    document.getElementById('field-luogo').style.display = (type === 'blog' || type === 'percorsi') ? 'none' : '';
    document.getElementById('field-estratto').style.display = (type === 'blog') ? '' : 'none';

    if (index !== undefined && contentCache[type]) {
      var item = contentCache[type].data[index];
      document.getElementById('f-titolo').value = item.titolo || '';
      document.getElementById('f-data').value = item.data || item.dataInizio || '';
      document.getElementById('f-periodo').value = item.periodo || '';
      document.getElementById('f-luogo').value = item.luogo || '';
      document.getElementById('f-descrizione').value = item.descrizione || '';
      document.getElementById('f-estratto').value = item.estratto || '';
      document.getElementById('f-immagine').value = item.immagine || '';
    } else {
      document.getElementById('contentForm').reset();
    }

    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeForm() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  document.getElementById('contentForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var type = document.getElementById('f-type').value;
    var index = parseInt(document.getElementById('f-index').value);

    var item = {
      id: document.getElementById('f-titolo').value.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
      titolo: document.getElementById('f-titolo').value,
      descrizione: document.getElementById('f-descrizione').value,
      immagine: document.getElementById('f-immagine').value,
      attivo: true
    };

    if (type === 'eventi') {
      item.data = document.getElementById('f-data').value;
      item.periodo = document.getElementById('f-periodo').value;
      item.luogo = document.getElementById('f-luogo').value;
    } else if (type === 'viaggi') {
      item.dataInizio = document.getElementById('f-data').value;
      item.periodo = document.getElementById('f-periodo').value;
      item.luogo = document.getElementById('f-luogo').value;
    } else if (type === 'blog') {
      item.data = document.getElementById('f-data').value;
      item.estratto = document.getElementById('f-estratto').value;
    }

    if (index >= 0) {
      contentCache[type].data[index] = item;
    } else {
      contentCache[type].data.push(item);
    }

    closeForm();
    saveContent(type);
  });

  // --- Actions ---
  function deleteItem(type, index) {
    if (!confirm('Eliminare questo contenuto?')) return;
    contentCache[type].data.splice(index, 1);
    saveContent(type);
  }

  function toggleActive(type, index) {
    contentCache[type].data[index].attivo = !contentCache[type].data[index].attivo;
    saveContent(type);
  }

  // --- GitHub API ---
  function ghGet(path) {
    return fetch('https://api.github.com/repos/' + REPO + '/contents/' + path + '?ref=' + BRANCH, {
      headers: { 'Authorization': 'token ' + token, 'Accept': 'application/vnd.github.v3+json' }
    }).then(function(r) { return r.json(); });
  }

  function saveContent(type) {
    showStatus('Salvataggio in corso...', 'loading');
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(contentCache[type].data, null, 2))));

    fetch('https://api.github.com/repos/' + REPO + '/contents/' + FILES[type], {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: 'Aggiornamento ' + type + ' da admin panel',
        content: content,
        sha: contentCache[type].sha,
        branch: BRANCH
      })
    })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      if (result.content) {
        contentCache[type].sha = result.content.sha;
        renderList(type);
        showStatus('Salvato. Il sito si aggiorna in circa 30 secondi.', 'success');
      } else {
        showStatus('Errore: ' + (result.message || 'sconosciuto'), 'error');
      }
    })
    .catch(function(e) {
      showStatus('Errore di rete: ' + e.message, 'error');
    });
  }

  function showStatus(msg, type) {
    var el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status ' + type;
    if (type === 'success') setTimeout(function() { el.style.display = 'none'; }, 4000);
  }
</script>
</body>
</html>
